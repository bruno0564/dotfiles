##############################
### LAYER RULES           ###
##############################

layerrule {
    name = wlogout-blur
    match:namespace = wlogout
    blur = true
    ignore_alpha = 0.5
}

##############################
### WINDOW RULES          ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# --- Workspace 1: Spotify, tty-clock, cbonsai, pipes ---

windowrule {
    name = spotify-workspace
    match:class = ^Spotify$
    workspace = 1 silent
    float = true
    size = 706 759
    move = 7 44
}

windowrule {
    name = ttyclock-workspace
    match:class = ^tty-clock-term$
    workspace = 1 silent
    float = true
    size = 706 373
    move = 727 44
}

windowrule {
    name = pipes-workspace
    match:class = ^pipes-term$
    workspace = 1 silent
    float = true
    size = 706 372
    move = 727 431
}

# --- Opacidad por app ---

windowrule {
    name = opacity-kitty
    match:class = ^kitty$
    opacity = 0.7 0.875
}

windowrule {
    name = opacity-tty-clock
    match:class = ^tty-clock-term$
    opacity = 0.7 0.875
}

windowrule {
    name = opacity-pipes
    match:class = ^pipes-term$
    opacity = 0.7 0.875
}

windowrule {
    name = opacity-vesktop
    match:class = ^vesktop$
    opacity = 0.8 0.8
}

windowrule {
    name = opacity-discord
    match:class = ^discord$
    opacity = 0.8 0.8
}

windowrule {
    name = opacity-spotify
    match:class = ^Spotify$
    opacity = 0.8 0.8
}

windowrule {
    name = opacity-zapzap
    match:class = ^com\.rtosta\.zapzap$
    opacity = 0.9 0.85
}
