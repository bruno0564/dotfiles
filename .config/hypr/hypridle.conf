general {
    lock_cmd = pidof hyprlock || hyprlock       # evita múltiples instancias de hyprlock
    before_sleep_cmd = loginctl lock-session    # bloquea antes de suspender
    after_sleep_cmd = hyprctl dispatch dpms on  # enciende pantalla al volver del suspend
}

# === 2.5 min: atenúa pantalla al 10% ===
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# === 5 min: bloquea pantalla ===
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# === 5.5 min: apaga pantalla ===
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# === 30 min: suspende el sistema ===
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
